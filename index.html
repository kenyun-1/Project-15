<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 15</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <main>
  <body>
    <section class="header">
    <nav>
      <h1>TaskFlow</h1>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Tasks</a></li>
        <li><a href="#">About</a></li>
      </ul>
    </nav>
    </section>
    <section class="hero">
      <h2>Task Manager</h2>
      <p class="secondary">Stay organized every day.</p>
      <div class="input-container">
        <input id="task-input"
          type="text"
          placeholder="Enter a task...">
        
        <button onclick="addTask()">Add Task</button>
      </div>  
    </section>
    <section class="tasks">
      <h2>My Tasks</h2>
      <div id="task-list">
      <article class="task-card">
        <p>📚Learn JavaScript</p>
        <button onclick="deletTask()">❌</button>
        <button onclick="completeTask()">✅</button>
      </article>
      </div>
    </section>
  </main>
    <footer>
      <p>Copyright &copy; TaskFlow</p>
    </footer>
  <script src="script.js"></script>
  </body>
</html>
